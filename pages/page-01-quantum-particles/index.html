<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quantum Particles — Next Gen Experience</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; }

    #overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 10;
    }

    .hero {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%); text-align: center;
      color: #fff;
    }

    .hero h1 {
      font-size: clamp(2rem, 6vw, 5rem);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #00f0ff, #bf00ff, #00f0ff);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 4s ease infinite;
      opacity: 0;
    }

    .hero p {
      font-size: clamp(0.8rem, 2vw, 1.2rem);
      color: rgba(255,255,255,0.6);
      margin-top: 1.5rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      opacity: 0;
    }

    .hero .cta {
      margin-top: 3rem;
      display: inline-block;
      padding: 1rem 3rem;
      border: 1px solid rgba(0, 240, 255, 0.5);
      color: #00f0ff;
      text-decoration: none;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-size: 0.9rem;
      pointer-events: all;
      cursor: pointer;
      transition: all 0.3s;
      opacity: 0;
      box-shadow: 0 0 20px rgba(0, 240, 255, 0.1), inset 0 0 20px rgba(0, 240, 255, 0.05);
    }

    .hero .cta:hover {
      background: rgba(0, 240, 255, 0.1);
      box-shadow: 0 0 40px rgba(0, 240, 255, 0.3), inset 0 0 30px rgba(0, 240, 255, 0.1);
      border-color: #00f0ff;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .scanlines {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: repeating-linear-gradient(
        0deg,
        transparent, transparent 2px,
        rgba(0, 240, 255, 0.015) 2px, rgba(0, 240, 255, 0.015) 4px
      );
      pointer-events: none; z-index: 5;
    }

    .corner {
      position: absolute;
      width: 60px; height: 60px;
      opacity: 0;
    }
    .corner.tl { top: 30px; left: 30px; border-top: 1px solid #00f0ff; border-left: 1px solid #00f0ff; }
    .corner.tr { top: 30px; right: 30px; border-top: 1px solid #00f0ff; border-right: 1px solid #00f0ff; }
    .corner.bl { bottom: 30px; left: 30px; border-bottom: 1px solid #bf00ff; border-left: 1px solid #bf00ff; }
    .corner.br { bottom: 30px; right: 30px; border-bottom: 1px solid #bf00ff; border-right: 1px solid #bf00ff; }

    .label {
      position: absolute;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      opacity: 0;
    }
    .label.tl { top: 100px; left: 30px; }
    .label.br { bottom: 100px; right: 30px; }
  </style>
</head>
<body>

<div class="scanlines"></div>

<div id="overlay">
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <div class="label tl">SYS://QUANTUM_CORE_v2.1</div>
  <div class="label br">ENTROPY: <span id="entropy">0.000</span>%</div>

  <div class="hero">
    <h1>Quantum</h1>
    <p>Particles in infinite motion</p>
    <a class="cta" href="#">Initialize Sequence</a>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js"></script>
<script>
  // Scene setup
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x000000, 1);
  document.body.appendChild(renderer.domElement);

  camera.position.z = 60;

  // Particle system
  const particleCount = 3000;
  const positions = new Float32Array(particleCount * 3);
  const colors = new Float32Array(particleCount * 3);
  const sizes = new Float32Array(particleCount);

  const colorA = new THREE.Color(0x00f0ff); // cyan
  const colorB = new THREE.Color(0xbf00ff); // magenta

  for (let i = 0; i < particleCount; i++) {
    const i3 = i * 3;
    const radius = 30 + Math.random() * 40;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);

    positions[i3] = radius * Math.sin(phi) * Math.cos(theta);
    positions[i3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
    positions[i3 + 2] = radius * Math.cos(phi);

    const mixRatio = Math.random();
    const c = colorA.clone().lerp(colorB, mixRatio);
    colors[i3] = c.r;
    colors[i3 + 1] = c.g;
    colors[i3 + 2] = c.b;

    sizes[i] = Math.random() * 2 + 0.5;
  }

  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

  const material = new THREE.PointsMaterial({
    size: 0.8,
    vertexColors: true,
    transparent: true,
    opacity: 0.8,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    sizeAttenuation: true
  });

  const particles = new THREE.Points(geometry, material);
  scene.add(particles);

  // Connection lines
  const linePositions = [];
  const lineColors = [];
  const maxConnections = 200;
  let connectionCount = 0;

  for (let i = 0; i < particleCount && connectionCount < maxConnections; i++) {
    for (let j = i + 1; j < particleCount && connectionCount < maxConnections; j++) {
      const dx = positions[i*3] - positions[j*3];
      const dy = positions[i*3+1] - positions[j*3+1];
      const dz = positions[i*3+2] - positions[j*3+2];
      const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
      if (dist < 12) {
        linePositions.push(
          positions[i*3], positions[i*3+1], positions[i*3+2],
          positions[j*3], positions[j*3+1], positions[j*3+2]
        );
        const alpha = 1 - dist / 12;
        lineColors.push(0, 240*alpha/255, 255*alpha/255, 0, 240*alpha/255, 255*alpha/255);
        connectionCount++;
      }
    }
  }

  const lineGeometry = new THREE.BufferGeometry();
  lineGeometry.setAttribute('position', new THREE.Float32BufferAttribute(linePositions, 3));
  lineGeometry.setAttribute('color', new THREE.Float32BufferAttribute(lineColors, 3));

  const lineMaterial = new THREE.LineBasicMaterial({
    vertexColors: true,
    transparent: true,
    opacity: 0.3,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });

  const lines = new THREE.LineSegments(lineGeometry, lineMaterial);
  scene.add(lines);

  // Floating central orb
  const orbGeom = new THREE.IcosahedronGeometry(4, 3);
  const orbMat = new THREE.MeshBasicMaterial({
    color: 0x00f0ff,
    wireframe: true,
    transparent: true,
    opacity: 0.15
  });
  const orb = new THREE.Mesh(orbGeom, orbMat);
  scene.add(orb);

  const innerOrb = new THREE.Mesh(
    new THREE.IcosahedronGeometry(3, 2),
    new THREE.MeshBasicMaterial({ color: 0xbf00ff, wireframe: true, transparent: true, opacity: 0.2 })
  );
  scene.add(innerOrb);

  // Animation
  let time = 0;
  const originalPositions = positions.slice();

  function animate() {
    requestAnimationFrame(animate);
    time += 0.005;

    particles.rotation.y += 0.0008;
    particles.rotation.x += 0.0003;

    lines.rotation.y = particles.rotation.y;
    lines.rotation.x = particles.rotation.x;

    orb.rotation.y += 0.005;
    orb.rotation.x += 0.003;
    innerOrb.rotation.y -= 0.008;
    innerOrb.rotation.x -= 0.005;

    // Pulsing scale
    const pulse = 1 + Math.sin(time * 3) * 0.05;
    orb.scale.set(pulse, pulse, pulse);

    // Entropy counter
    const entropyVal = (50 + Math.sin(time) * 49.9).toFixed(3);
    const entropyEl = document.getElementById('entropy');
    if (entropyEl) entropyEl.textContent = entropyVal;

    // Subtle camera drift
    camera.position.x = Math.sin(time * 0.5) * 5;
    camera.position.y = Math.cos(time * 0.3) * 5;
    camera.lookAt(scene.position);

    renderer.render(scene, camera);
  }
  animate();

  // Entrance animations
  gsap.from('.corner', { opacity: 0, duration: 1.5, stagger: 0.2, ease: 'power2.out', delay: 0.5 });
  gsap.from('.label', { opacity: 0, duration: 1.5, stagger: 0.3, ease: 'power2.out', delay: 1 });
  gsap.to('.hero h1', { opacity: 1, y: 0, duration: 1.5, ease: 'power3.out', delay: 1.2 });
  gsap.fromTo('.hero h1', { y: 30 }, { y: 0, duration: 1.5, ease: 'power3.out', delay: 1.2 });
  gsap.to('.hero p', { opacity: 1, duration: 1.5, ease: 'power2.out', delay: 1.8 });
  gsap.to('.hero .cta', { opacity: 1, duration: 1.5, ease: 'power2.out', delay: 2.4 });
  gsap.fromTo('.hero .cta', { y: 20 }, { y: 0, duration: 1.5, ease: 'power2.out', delay: 2.4 });

  // Resize
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>
</body>
</html>
