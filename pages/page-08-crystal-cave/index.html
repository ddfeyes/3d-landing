<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crystal Cave — Immersive 3D Experience</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
    canvas { display: block; position: fixed; top: 0; left: 0; }

    .overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 10;
    }

    .hero {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #fff;
    }

    .hero h1 {
      font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #e0f7ff;
      text-shadow:
        0 0 20px rgba(120, 220, 255, 0.8),
        0 0 60px rgba(80, 180, 255, 0.5),
        0 0 120px rgba(40, 120, 255, 0.3);
      opacity: 0;
    }

    .hero p {
      font-size: clamp(0.8rem, 2vw, 1.1rem);
      letter-spacing: 0.5em;
      color: rgba(180, 240, 255, 0.6);
      margin-top: 1.5rem;
      opacity: 0;
      text-transform: uppercase;
    }

    .hero .line {
      display: block;
      overflow: hidden;
    }

    .hero .line span {
      display: inline-block;
      transform: translateY(100%);
    }

    .corner {
      position: absolute;
      width: 60px; height: 60px;
      border-color: rgba(100, 200, 255, 0.3);
      border-style: solid;
    }
    .corner.tl { top: 30px; left: 30px; border-width: 2px 0 0 2px; }
    .corner.tr { top: 30px; right: 30px; border-width: 2px 2px 0 0; }
    .corner.bl { bottom: 30px; left: 30px; border-width: 0 0 2px 2px; }
    .corner.br { bottom: 30px; right: 30px; border-width: 0 2px 2px 0; }

    .scroll-hint {
      position: absolute; bottom: 40px; left: 50%;
      transform: translateX(-50%);
      color: rgba(140, 210, 255, 0.4);
      font-size: 0.65rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      opacity: 0;
    }

    .vignette {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,5,20,0.8) 100%);
      pointer-events: none; z-index: 5;
    }
  </style>
</head>
<body>
  <div class="vignette"></div>
  <div class="overlay">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div class="hero">
      <h1 id="headline"></h1>
      <p id="subline"></p>
    </div>
    <div class="scroll-hint" id="scrollHint">Explore the depths</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js"></script>
  <script>
    // --- Scene Setup ---
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000510, 0.025);

    const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 200);
    camera.position.set(0, 2, 18);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.setClearColor(0x000510);
    document.body.appendChild(renderer.domElement);

    // --- Lighting ---
    const ambient = new THREE.AmbientLight(0x0a1a2a, 0.5);
    scene.add(ambient);

    const pointLight1 = new THREE.PointLight(0x4fc3f7, 3, 40);
    pointLight1.position.set(-8, 6, 4);
    scene.add(pointLight1);

    const pointLight2 = new THREE.PointLight(0x7b1fa2, 2, 35);
    pointLight2.position.set(8, -4, 2);
    scene.add(pointLight2);

    const pointLight3 = new THREE.PointLight(0x00bcd4, 2.5, 30);
    pointLight3.position.set(0, 8, -5);
    scene.add(pointLight3);

    // --- Crystal Geometry ---
    function createCrystal(height, radius, color) {
      const geom = new THREE.ConeGeometry(radius, height, 6, 1);
      const mat = new THREE.MeshPhongMaterial({
        color: color,
        emissive: color,
        emissiveIntensity: 0.15,
        transparent: true,
        opacity: 0.82,
        shininess: 120,
        specular: 0xffffff,
      });
      return new THREE.Mesh(geom, mat);
    }

    const crystals = [];
    const crystalData = [];

    const palette = [
      0x4fc3f7, // ice blue
      0x7b1fa2, // violet
      0x00bcd4, // cyan
      0xb39ddb, // lavender
      0x26c6da, // teal
      0xce93d8, // pink
      0x80deea, // pale cyan
    ];

    for (let i = 0; i < 70; i++) {
      const h = 1.5 + Math.random() * 6;
      const r = 0.15 + Math.random() * 0.55;
      const color = palette[Math.floor(Math.random() * palette.length)];
      const crystal = createCrystal(h, r, color);

      const angle = Math.random() * Math.PI * 2;
      const dist = 2 + Math.random() * 22;
      const x = Math.cos(angle) * dist;
      const z = Math.sin(angle) * dist - 5;
      const y = -2 + Math.random() * 3;

      crystal.position.set(x, y, z);
      crystal.rotation.y = Math.random() * Math.PI;
      crystal.rotation.z = (Math.random() - 0.5) * 0.4;

      const scale = 0.5 + Math.random() * 1.2;
      crystal.scale.set(scale, scale, scale);

      scene.add(crystal);
      crystals.push(crystal);

      crystalData.push({
        baseY: y,
        baseRotZ: crystal.rotation.z,
        speed: 0.2 + Math.random() * 0.6,
        amp: 0.05 + Math.random() * 0.15,
        phase: Math.random() * Math.PI * 2,
        lightPhase: Math.random() * Math.PI * 2,
      });
    }

    // --- Ground plane ---
    const groundGeom = new THREE.PlaneGeometry(80, 80, 40, 40);
    const groundMat = new THREE.MeshPhongMaterial({
      color: 0x050f1a,
      transparent: true,
      opacity: 0.7,
    });
    const ground = new THREE.Mesh(groundGeom, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -3;
    scene.add(ground);

    // --- Stalactites (ceiling) ---
    for (let i = 0; i < 30; i++) {
      const h = 1 + Math.random() * 4;
      const r = 0.1 + Math.random() * 0.3;
      const color = palette[Math.floor(Math.random() * palette.length)];
      const stal = createCrystal(h, r, color);
      stal.rotation.z = Math.PI;

      const angle = Math.random() * Math.PI * 2;
      const dist = 3 + Math.random() * 18;
      stal.position.set(
        Math.cos(angle) * dist,
        8 + Math.random() * 4,
        Math.sin(angle) * dist - 5
      );
      const sc = 0.4 + Math.random() * 0.9;
      stal.scale.set(sc, sc, sc);
      scene.add(stal);
      crystals.push(stal);
      crystalData.push({
        baseY: stal.position.y,
        baseRotZ: stal.rotation.z,
        speed: 0.1 + Math.random() * 0.3,
        amp: 0.02 + Math.random() * 0.05,
        phase: Math.random() * Math.PI * 2,
        lightPhase: Math.random() * Math.PI * 2,
      });
    }

    // --- Particles (floating dust) ---
    const pCount = 800;
    const pPositions = new Float32Array(pCount * 3);
    const pSizes = new Float32Array(pCount);
    for (let i = 0; i < pCount; i++) {
      pPositions[i * 3] = (Math.random() - 0.5) * 50;
      pPositions[i * 3 + 1] = (Math.random() - 0.5) * 20 + 2;
      pPositions[i * 3 + 2] = (Math.random() - 0.5) * 40 - 10;
      pSizes[i] = 0.5 + Math.random() * 2;
    }
    const pGeom = new THREE.BufferGeometry();
    pGeom.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
    pGeom.setAttribute('size', new THREE.BufferAttribute(pSizes, 1));

    const pMat = new THREE.PointsMaterial({
      color: 0x88d6f5,
      size: 0.08,
      transparent: true,
      opacity: 0.5,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    });
    const particles = new THREE.Points(pGeom, pMat);
    scene.add(particles);

    // --- Animate Crystals ---
    let t = 0;
    function animateCrystals() {
      t += 0.016;
      for (let i = 0; i < crystals.length; i++) {
        const d = crystalData[i];
        crystals[i].position.y = d.baseY + Math.sin(t * d.speed + d.phase) * d.amp;
        crystals[i].rotation.z = d.baseRotZ + Math.sin(t * d.speed * 0.7 + d.phase) * 0.03;
      }
      pointLight1.intensity = 3 + Math.sin(t * 0.8) * 0.8;
      pointLight2.intensity = 2 + Math.sin(t * 0.6 + 1.5) * 0.7;
      pointLight3.intensity = 2.5 + Math.sin(t * 0.5 + 3) * 0.6;
    }

    // --- Mouse parallax ---
    let mouseX = 0, mouseY = 0;
    document.addEventListener('mousemove', (e) => {
      mouseX = (e.clientX / innerWidth - 0.5) * 2;
      mouseY = (e.clientY / innerHeight - 0.5) * 2;
    });

    // --- Render loop ---
    let scrollY = 0;
    window.addEventListener('scroll', () => { scrollY = window.scrollY; });

    function animate() {
      requestAnimationFrame(animate);
      animateCrystals();

      const pPos = pGeom.attributes.position.array;
      for (let i = 0; i < pCount; i++) {
        pPos[i * 3 + 1] += 0.005;
        if (pPos[i * 3 + 1] > 12) pPos[i * 3 + 1] = -8;
      }
      pGeom.attributes.position.needsUpdate = true;

      camera.position.x += (mouseX * 2 - camera.position.x) * 0.02;
      camera.position.y += (-mouseY * 1.5 + 2 - camera.position.y) * 0.02;
      camera.lookAt(0, 0, 0);

      renderer.render(scene, camera);
    }
    animate();

    // --- Headline animation ---
    const headline = document.getElementById('headline');
    const subline = document.getElementById('subline');
    const scrollHint = document.getElementById('scrollHint');

    const h1Lines = ['CRYSTAL', 'CAVE'].map(w => `<span class="line"><span>${w}</span></span>`).join('');
    headline.innerHTML = h1Lines;
    subline.textContent = 'Into the luminous depths';

    gsap.to(headline.querySelectorAll('span span'), {
      y: 0,
      duration: 1.8,
      stagger: 0.2,
      ease: 'power3.out',
      delay: 0.5,
    });
    gsap.to(subline, {
      opacity: 1,
      y: 0,
      duration: 1.4,
      ease: 'power2.out',
      delay: 1.4,
    });
    gsap.to(scrollHint, {
      opacity: 1,
      duration: 1.2,
      delay: 2.5,
      repeat: -1,
      yoyo: true,
      repeatDelay: 1,
    });

    // --- Scroll section ---
    const sections = [];
    const sectionData = [
      { text: 'LUMINESCENCE', y: '40vh' },
      { text: 'ETERNAL FORMATION', y: '120vh' },
      { text: 'PRISM OF TIME', y: '200vh' },
    ];
    sectionData.forEach((d, i) => {
      const el = document.createElement('div');
      el.style.cssText = `position:absolute;top:${d.y};left:50%;transform:translateX(-50%);color:rgba(140,210,255,0.7);font-size:clamp(1rem,3vw,1.8rem);letter-spacing:0.5em;text-transform:uppercase;white-space:nowrap;opacity:0;text-shadow:0 0 20px rgba(80,180,255,0.6);`;
      el.textContent = d.text;
      document.querySelector('.hero').appendChild(el);
      sections.push(el);
    });

    // --- Resize ---
    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
