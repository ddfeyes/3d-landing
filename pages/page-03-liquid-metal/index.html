<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liquid Metal — Future Material</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; }

    .hero {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 10; pointer-events: none;
    }
    .hero h1 {
      font-size: clamp(2.5rem, 8vw, 7rem);
      color: #e8e8e8;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      text-shadow:
        0 0 20px rgba(180,200,255,0.6),
        0 0 60px rgba(120,160,255,0.3),
        0 0 120px rgba(80,120,255,0.15);
      opacity: 0;
      transform: translateY(40px);
    }
    .hero p {
      font-size: clamp(0.8rem, 2vw, 1.1rem);
      color: rgba(160,180,220,0.7);
      letter-spacing: 0.5em;
      margin-top: 1.5rem;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(20px);
    }
    .hero .cta {
      margin-top: 3rem;
      padding: 1rem 3rem;
      border: 1px solid rgba(150,170,220,0.4);
      color: rgba(180,200,240,0.8);
      text-transform: uppercase;
      letter-spacing: 0.3em;
      font-size: 0.85rem;
      pointer-events: all;
      cursor: pointer;
      background: rgba(100,120,200,0.05);
      opacity: 0;
      box-shadow: 0 0 30px rgba(100,140,255,0.1), inset 0 0 20px rgba(100,140,255,0.05);
      transition: all 0.3s ease;
    }
    .hero .cta:hover {
      background: rgba(100,120,200,0.15);
      box-shadow: 0 0 50px rgba(100,140,255,0.3), inset 0 0 30px rgba(100,140,255,0.1);
      color: rgba(200,220,255,1);
    }

    .section {
      position: relative; z-index: 10;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .section-content {
      max-width: 600px; text-align: center; padding: 2rem;
      opacity: 0; transform: translateY(30px);
    }
    .section-content h2 {
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      color: #d0d0d0;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 1rem;
      text-shadow: 0 0 20px rgba(150,180,255,0.4);
    }
    .section-content p {
      color: rgba(140,160,200,0.7);
      font-size: 1rem;
      line-height: 1.8;
      letter-spacing: 0.05em;
    }

    .scroll-indicator {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
      z-index: 20; opacity: 0; color: rgba(150,170,210,0.5);
      font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase;
      animation: bounce 2s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(8px); }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div class="hero">
    <h1 id="headline">Liquid Metal</h1>
    <p id="subline">Chrome that breathes</p>
    <button class="cta" id="cta">Explore Material</button>
  </div>

  <div class="section" style="padding-top: 100vh;">
    <div class="section-content" id="section1">
      <h2>Adaptive Surface</h2>
      <p>Molten chrome that responds to every touch. A material born from the space between solid and liquid — permanent yet ever-changing, cold yet alive.</p>
    </div>
  </div>

  <div class="scroll-indicator" id="scrollind">↓ scroll ↓</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/ScrollTrigger.min.js"></script>

  <script>
    // Scene setup
    const canvas = document.getElementById('canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 1);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.z = 6;

    // Lights
    const ambientLight = new THREE.AmbientLight(0x111133, 0.5);
    scene.add(ambientLight);

    const blueLight = new THREE.PointLight(0x4466ff, 2, 20);
    blueLight.position.set(3, 3, 3);
    scene.add(blueLight);

    const purpleLight = new THREE.PointLight(0x8833ff, 2, 20);
    purpleLight.position.set(-3, -2, 2);
    scene.add(purpleLight);

    const whiteLight = new THREE.PointLight(0xffffff, 1.5, 15);
    whiteLight.position.set(0, 4, 4);
    scene.add(whiteLight);

    // Custom liquid metal shader
    const vertexShader = `
      varying vec3 vNormal;
      varying vec3 vPosition;
      varying vec2 vUv;
      uniform float uTime;

      void main() {
        vNormal = normalize(normalMatrix * normal);
        vPosition = position;
        vUv = uv;

        vec3 pos = position;
        float wave = sin(pos.x * 3.0 + uTime * 0.8) * 0.08
                   + cos(pos.y * 2.5 + uTime * 0.6) * 0.06
                   + sin(pos.z * 4.0 + uTime * 1.2) * 0.04;
        pos += normal * wave;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
      }
    `;

    const fragmentShader = `
      varying vec3 vNormal;
      varying vec3 vPosition;
      varying vec2 vUv;
      uniform float uTime;
      uniform vec3 uColor1;
      uniform vec3 uColor2;

      void main() {
        vec3 viewDir = normalize(cameraPosition - vPosition);
        float fresnel = pow(1.0 - max(dot(vNormal, viewDir), 0.0), 2.5);

        float shift = sin(vUv.x * 10.0 + uTime * 0.5) * 0.5 + 0.5;
        vec3 baseColor = mix(uColor1, uColor2, shift);
        vec3 reflectColor = vec3(0.9, 0.95, 1.0);

        vec3 finalColor = mix(baseColor, reflectColor, fresnel * 0.8);
        float specular = pow(max(dot(reflect(-viewDir, vNormal), vec3(0.5, 1.0, 0.5)), 0.0), 32.0);
        finalColor += specular * vec3(1.0, 1.0, 1.0) * 0.5;

        gl_FragColor = vec4(finalColor, 1.0);
      }
    `;

    // Create liquid metal spheres
    const spheres = [];
    const sphereCount = 7;
    const colors1 = [0x6688cc, 0x5566aa, 0x7788dd, 0x4466bb, 0x6699cc, 0x5577bb, 0x8866cc];
    const colors2 = [0x99aadd, 0x8899cc, 0xaabbff, 0x7799cc, 0x88bbdd, 0x7788cc, 0xaa88dd];

    for (let i = 0; i < sphereCount; i++) {
      const geo = new THREE.SphereGeometry(0.5 + Math.random() * 0.5, 64, 64);
      const mat = new THREE.ShaderMaterial({
        vertexShader,
        fragmentShader,
        uniforms: {
          uTime: { value: 0 },
          uColor1: { value: new THREE.Color(colors1[i]) },
          uColor2: { value: new THREE.Color(colors2[i]) }
        }
      });
      const mesh = new THREE.Mesh(geo, mat);

      const angle = (i / sphereCount) * Math.PI * 2;
      const radius = 2.2 + Math.sin(i * 1.3) * 0.8;
      mesh.position.set(
        Math.cos(angle) * radius,
        Math.sin(i * 0.8) * 1.2 - 0.5,
        Math.sin(angle) * radius - 1
      );
      mesh.userData = { baseY: mesh.position.y, phase: i * 0.8, radius, angle };
      scene.add(mesh);
      spheres.push(mesh);
    }

    // Floating particles
    const particleCount = 300;
    const pGeo = new THREE.BufferGeometry();
    const pPositions = new Float32Array(particleCount * 3);
    for (let i = 0; i < particleCount * 3; i++) {
      pPositions[i] = (Math.random() - 0.5) * 15;
    }
    pGeo.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
    const pMat = new THREE.PointsMaterial({
      color: 0x8899cc,
      size: 0.03,
      transparent: true,
      opacity: 0.6,
      blending: THREE.AdditiveBlending
    });
    const particles = new THREE.Points(pGeo, pMat);
    scene.add(particles);

    // Torus rings
    const rings = [];
    for (let i = 0; i < 3; i++) {
      const ringGeo = new THREE.TorusGeometry(1.5 + i * 0.5, 0.01, 16, 100);
      const ringMat = new THREE.MeshBasicMaterial({
        color: [0x4466ff, 0x8844ff, 0x22aaff][i],
        transparent: true,
        opacity: 0.2 + i * 0.1
      });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.rotation.x = Math.PI / 2 + (i - 1) * 0.3;
      ring.rotation.y = i * 0.5;
      ring.userData = { rotSpeed: 0.002 + i * 0.001 };
      scene.add(ring);
      rings.push(ring);
    }

    // GSAP Animations
    gsap.registerPlugin(ScrollTrigger);

    // Hero entrance
    gsap.to('#headline', { opacity: 1, y: 0, duration: 1.5, ease: 'power3.out', delay: 0.3 });
    gsap.to('#subline', { opacity: 1, y: 0, duration: 1.2, ease: 'power3.out', delay: 0.7 });
    gsap.to('#cta', { opacity: 1, y: 0, duration: 1.2, ease: 'power3.out', delay: 1.1 });
    gsap.to('#scrollind', { opacity: 1, duration: 1, delay: 2 });

    // Scroll indicator fade on scroll
    gsap.to('#scrollind', {
      opacity: 0,
      scrollTrigger: { trigger: 'body', start: 'top top', end: '20% top', scrub: true }
    });

    // Section reveal
    gsap.to('#section1', {
      opacity: 1, y: 0, duration: 1,
      scrollTrigger: { trigger: '#section1', start: 'top 70%', end: 'top 30%', scrub: false, toggleActions: 'play none none reverse' }
    });

    // Headline parallax on scroll
    gsap.to('#headline', {
      y: -100, opacity: 0.2,
      scrollTrigger: { trigger: 'body', start: 'top top', end: '50% top', scrub: 1 }
    });

    // Clock & render
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      spheres.forEach((s, i) => {
        s.material.uniforms.uTime.value = t;
        s.position.y = s.userData.baseY + Math.sin(t * 0.5 + s.userData.phase) * 0.3;
        s.position.x = Math.cos(s.userData.angle + t * 0.15) * s.userData.radius;
        s.rotation.y = t * 0.3 + i;
        s.rotation.x = Math.sin(t * 0.2 + i) * 0.3;
      });

      particles.rotation.y = t * 0.03;
      particles.rotation.x = t * 0.01;

      rings.forEach(r => {
        r.rotation.z += r.userData.rotSpeed;
        r.rotation.x = Math.sin(t * 0.2) * 0.5;
      });

      blueLight.position.x = Math.sin(t * 0.5) * 4;
      blueLight.position.y = Math.cos(t * 0.3) * 3;
      purpleLight.position.x = Math.cos(t * 0.4) * 3;
      purpleLight.position.y = Math.sin(t * 0.6) * 4;

      renderer.render(scene, camera);
    }
    animate();

    // Resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // CTA button glow animation
    const cta = document.getElementById('cta');
    let glowDir = 1, glowVal = 0.1;
    setInterval(() => {
      glowVal += 0.002 * glowDir;
      if (glowVal > 0.4 || glowVal < 0.05) glowDir *= -1;
      cta.style.boxShadow = `0 0 ${30 + glowVal * 50}px rgba(100,140,255,${glowVal}), inset 0 0 20px rgba(100,140,255,${glowVal * 0.2})`;
    }, 30);
  </script>
</body>
</html>
